# Mosquitto Configuration for Vehicle Telemetry

# Listeners
listener 1883
protocol mqtt

# Allow anonymous connections (dev only - use authentication in production)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# Connection settings
max_connections -1
max_queued_messages 1000

# Message size limits (10MB)
message_size_limit 10485760

# WebSocket support (optional, for debugging)
listener 9001
protocol websockets
